name: CI/CD
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: 1.26
        cache: true

    - name: Checkout code
      uses: actions/checkout@v6

    - name: Get dependencies
      run: go mod download

    - name: Run Tests
      run: go test -v ./...

  release:
    name: Release
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: 1.26

    - name: Run semantic release
      uses: cycjimmy/semantic-release-action@v6
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]

    steps:
    - name: Set up Go 1.26
      uses: actions/setup-go@v6
      with:
        go-version: 1.26
        cache: true
      id: go

    - name: Check out code
      uses: actions/checkout@v6

    - name: Get dependencies
      run: go mod download

    - name: Building
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
        CGO_ENABLED: 0
      run: |
        OUTPUT_NAME=bin/comicscanner-${{ matrix.goos }}-${{ matrix.goarch }}
        go build -v -o $OUTPUT_NAME ./cmd/

    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: comicscanner-${{ matrix.goos }}-${{ matrix.goarch }}
        path: bin/comicscanner-*
        retention-days: 5
